<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Petty Cash Expense Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      padding: 20px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      font-size: 15px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 22px;
      background: #1a73e8;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .message {
      margin-top: 18px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }

    .success {
      background: #e6f4ea;
      color: #137333;
    }

    .error {
      background: #fce8e6;
      color: #c5221f;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Petty Cash Expense Form</h1>

    <form id="expenseForm">
      <label>Дата расхода *</label>
      <input type="date" name="expenseDate" required />

      <label>ФИО сотрудника *</label>
      <input type="text" name="employeeName" required placeholder="Например: Ivan Ivanov" />

      <label>Сумма *</label>
      <input type="number" name="amount" required step="0.01" min="0.01" placeholder="Например: 125.50" />

      <label>Валюта</label>
      <select name="currency">
        <option value="AED">AED</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="RUB">RUB</option>
      </select>

      <label>Категория расхода</label>
      <select name="category">
        <option value="">Выберите категорию</option>
        <option value="Materials">Materials / Материалы</option>
        <option value="Office expenses">Office expenses / Хоз. расходы</option>
        <option value="Travel expenses">Travel expenses / Командировочные</option>
        <option value="Fuel / Transport">Fuel / Transport / Транспорт</option>
        <option value="Other">Other / Прочее</option>
      </select>

      <label>Комментарий</label>
      <textarea name="comment" rows="3" placeholder="Кратко опишите расход"></textarea>

      <label>Фото чека / подтверждение оплаты *</label>
      <input type="file" name="receipt" accept="image/*,.pdf" required />

      <button type="submit" id="submitBtn">Отправить</button>
    </form>

    <div id="message" class="message"></div>
  </div>

  <script>
    const SCRIPT_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';

    const form = document.getElementById('expenseForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('message');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Отправка...';
      hideMessage();

      try {
        const formData = new FormData(form);
        const file = formData.get('receipt');

        if (!file) {
          throw new Error('Пожалуйста, загрузите файл чека.');
        }

        const fileBase64 = await fileToBase64(file);

        const payload = new URLSearchParams();

        payload.append('expenseDate', formData.get('expenseDate'));
        payload.append('employeeName', formData.get('employeeName'));
        payload.append('amount', formData.get('amount'));
        payload.append('currency', formData.get('currency'));
        payload.append('category', formData.get('category'));
        payload.append('comment', formData.get('comment'));
        payload.append('fileBase64', fileBase64);
        payload.append('fileName', file.name);
        payload.append('mimeType', file.type || 'application/octet-stream');

        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: payload
        });

        const result = await response.json();

        if (!result.success) {
          throw new Error(result.message || 'Ошибка отправки данных.');
        }

        showMessage('Расход успешно отправлен. Спасибо!', 'success');
        form.reset();

      } catch (error) {
        showMessage(error.message, 'error');

      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Отправить';
      }
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Не удалось прочитать файл.'));

        reader.readAsDataURL(file);
      });
    }

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = 'message ' + type;
      messageBox.style.display = 'block';
    }

    function hideMessage() {
      messageBox.style.display = 'none';
      messageBox.textContent = '';
    }
  </script>
</body>
</html>
