<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Petty Cash Expense Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      font-size: 15px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: vertical;
    }

    button {
      margin-top: 22px;
      background: #1a73e8;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .message {
      margin-top: 18px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
    }

    .success {
      background: #e6f4ea;
      color: #137333;
    }

    .error {
      background: #fce8e6;
      color: #c5221f;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    iframe {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Petty Cash Expense Form</h1>

    <form id="expenseForm">
      <label for="expenseDate">Дата расхода *</label>
      <input
        type="date"
        id="expenseDate"
        name="expenseDate"
        required
      />

      <label for="employeeName">ФИО сотрудника *</label>
      <input
        type="text"
        id="employeeName"
        name="employeeName"
        required
        placeholder="Например: Екатерина"
      />

      <label for="amount">Сумма *</label>
      <input
        type="number"
        id="amount"
        name="amount"
        required
        step="0.01"
        min="0.01"
        placeholder="Например: 1000"
      />

      <label for="currency">Валюта</label>
      <select id="currency" name="currency">
        <option value="AED">AED</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="RUB">RUB</option>
      </select>

      <label for="category">Категория расхода</label>
      <select id="category" name="category">
        <option value="">Выберите категорию</option>
        <option value="Materials / Материалы">Materials / Материалы</option>
        <option value="Office expenses / Хоз. расходы">Office expenses / Хоз. расходы</option>
        <option value="Travel expenses / Командировочные">Travel expenses / Командировочные</option>
        <option value="Fuel / Transport / Транспорт">Fuel / Transport / Транспорт</option>
        <option value="Meals / Питание">Meals / Питание</option>
        <option value="Other / Прочее">Other / Прочее</option>
      </select>

      <label for="comment">Комментарий</label>
      <textarea
        id="comment"
        name="comment"
        rows="3"
        placeholder="Кратко опишите расход"
      ></textarea>

      <label for="receipt">Фото чека / подтверждение оплаты *</label>
      <input
        type="file"
        id="receipt"
        name="receipt"
        accept="image/*,.pdf"
        required
      />

      <button type="submit" id="submitBtn">Отправить</button>
    </form>

    <div id="message" class="message"></div>

    <div class="note">
      После отправки проверьте Google Таблицу и папку Google Drive.
    </div>
  </div>

  <iframe name="hidden_iframe" id="hidden_iframe"></iframe>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwp8rMvvYTDUyABLk-6ngeXHdo-SQsPfkSv8oWD8r_U0MMUeWrK3FiH1nY-Onu7gyu52Q/exec';

    const form = document.getElementById('expenseForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('message');

    form.addEventListener('submit', async function(event) {
      event.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Отправка...';
      hideMessage();

      try {
        const expenseDate = document.getElementById('expenseDate').value;
        const employeeName = document.getElementById('employeeName').value.trim();
        const amount = document.getElementById('amount').value;
        const currency = document.getElementById('currency').value;
        const category = document.getElementById('category').value;
        const comment = document.getElementById('comment').value.trim();
        const fileInput = document.getElementById('receipt');
        const file = fileInput.files[0];

        if (!expenseDate) {
          throw new Error('Укажите дату расхода.');
        }

        if (!employeeName) {
          throw new Error('Укажите ФИО сотрудника.');
        }

        if (!amount || Number(amount) <= 0) {
          throw new Error('Укажите корректную сумму.');
        }

        if (!file) {
          throw new Error('Загрузите фото чека или файл подтверждения.');
        }

        const maxFileSize = 5 * 1024 * 1024;

        if (file.size > maxFileSize) {
          throw new Error('Файл слишком большой. Загрузите файл до 5 MB.');
        }

        const fileBase64 = await fileToBase64(file);

        const postForm = document.createElement('form');
        postForm.method = 'POST';
        postForm.action = SCRIPT_URL;
        postForm.target = 'hidden_iframe';
        postForm.style.display = 'none';

        addHiddenField(postForm, 'expenseDate', expenseDate);
        addHiddenField(postForm, 'employeeName', employeeName);
        addHiddenField(postForm, 'amount', amount);
        addHiddenField(postForm, 'currency', currency);
        addHiddenField(postForm, 'category', category);
        addHiddenField(postForm, 'comment', comment);
        addHiddenField(postForm, 'fileBase64', fileBase64);
        addHiddenField(postForm, 'fileName', file.name);
        addHiddenField(postForm, 'mimeType', file.type || 'application/octet-stream');

        document.body.appendChild(postForm);
        postForm.submit();

        setTimeout(function() {
          showMessage(
            'Форма отправлена. Проверьте Google Таблицу и папку с чеками.',
            'success'
          );

          form.reset();
          submitBtn.disabled = false;
          submitBtn.textContent = 'Отправить';

          if (document.body.contains(postForm)) {
            document.body.removeChild(postForm);
          }
        }, 3000);

      } catch (error) {
        showMessage(error.message, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Отправить';
      }
    });

    function addHiddenField(formElement, name, value) {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = name;
      input.value = value;
      formElement.appendChild(input);
    }

    function fileToBase64(file) {
      return new Promise(function(resolve, reject) {
        const reader = new FileReader();

        reader.onload = function() {
          resolve(reader.result);
        };

        reader.onerror = function() {
          reject(new Error('Не удалось прочитать файл.'));
        };

        reader.readAsDataURL(file);
      });
    }

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = 'message ' + type;
      messageBox.style.display = 'block';
    }

    function hideMessage() {
      messageBox.style.display = 'none';
      messageBox.textContent = '';
      messageBox.className = 'message';
    }
  </script>
</body>
</html>
